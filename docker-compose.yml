version: "3.9"
services:
  api:
    build: .
    container_name: startup-agent-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./:/app

  ui:
    image: python:3.11-slim
    container_name: startup-agent-ui
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             streamlit run ui/streamlit_app.py --server.port 8501 --server.address 0.0.0.0"
    env_file:
      - .env
    ports:
      - "8501:8501"
    volumes:
      - ./:/app
    depends_on:
      - api
