services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: startup-agent-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./:/app

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: startup-agent-ui
    environment:
      - API_BASE_URL=http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
